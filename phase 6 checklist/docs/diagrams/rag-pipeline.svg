<svg viewBox="0 0 1280 600" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-labelledby="ttl desc">
  <title id="ttl">BrokerAssist RAG Pipeline</title>
  <desc id="desc">Eight-stage knowledge retrieval pipeline: detect language, translate query to English, embed, hybrid retrieve from Qdrant, RRF fuse to top twenty, cross-encoder rerank to top five with a relevance gate, generate a grounded answer with Gemma, then translate back and resolve citations from PostgreSQL.</desc>

  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#059669"/>
    </marker>
    <style>
      .step { rx:12; fill:#ecfdf5; stroke:#059669; stroke-width:1.6; }
      .n    { font-size:13px; font-weight:800; fill:#047857; }
      .t    { font-size:13.5px; font-weight:700; fill:#064e3b; }
      .s    { font-size:10.5px; fill:#475569; }
      .pill { rx:22; }
      .flow { stroke:#059669; stroke-width:2; fill:none; }
      .store{ rx:10; fill:#fff1f2; stroke:#e11d48; stroke-width:1.4; }
      .stt  { font-size:12px; font-weight:700; fill:#9f1239; }
      .sts  { font-size:10px; fill:#9f1239; }
    </style>
  </defs>

  <text x="640" y="36" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">BrokerAssist — Knowledge RAG Pipeline</text>
  <text x="640" y="58" text-anchor="middle" font-size="12.5" fill="#64748b">Branch B of the intent router · query translated to English before retrieval · citations resolved from PostgreSQL, never the vector store</text>

  <!-- INPUT -->
  <rect class="pill" x="455" y="80" width="370" height="42" fill="#eef2ff" stroke="#6366f1"/>
  <text x="640" y="106" text-anchor="middle" font-size="13" font-weight="700" fill="#3730a3">User question  ·  EN / HI / TA</text>
  <path class="flow" d="M640 122 L640 150" marker-end="url(#a)"/>

  <!-- ROW 1 -->
  <g>
    <rect class="step" x="40"  y="150" width="262" height="86"/>
    <text class="n" x="56" y="174">1</text>
    <text class="t" x="56" y="196">Detect language</text>
    <text class="s" x="56" y="214">Sarvam — sets user_lang</text>

    <rect class="step" x="352" y="150" width="262" height="86"/>
    <text class="n" x="368" y="174">2</text>
    <text class="t" x="368" y="196">Translate query → English</text>
    <text class="s" x="368" y="214">fixes HI / TA retrieval recall</text>

    <rect class="step" x="664" y="150" width="262" height="86"/>
    <text class="n" x="680" y="174">3</text>
    <text class="t" x="680" y="196">Embed query</text>
    <text class="s" x="680" y="214">embeddinggemma (remote)</text>

    <rect class="step" x="976" y="150" width="264" height="86"/>
    <text class="n" x="992" y="174">4</text>
    <text class="t" x="992" y="196">Hybrid retrieve</text>
    <text class="s" x="992" y="214">Qdrant dense + sparse,</text>
    <text class="s" x="992" y="228">filters at retrieval</text>
  </g>
  <path class="flow" d="M302 193 L352 193" marker-end="url(#a)"/>
  <path class="flow" d="M614 193 L664 193" marker-end="url(#a)"/>
  <path class="flow" d="M926 193 L976 193" marker-end="url(#a)"/>

  <!-- wrap arrow row1 -> row2 -->
  <path class="flow" d="M1108 236 L1108 300 L172 300 L172 360" marker-end="url(#a)"/>

  <!-- ROW 2 -->
  <g>
    <rect class="step" x="40"  y="360" width="262" height="92"/>
    <text class="n" x="56" y="384">5</text>
    <text class="t" x="56" y="406">RRF fuse → Top-20</text>
    <text class="s" x="56" y="424">reciprocal-rank fusion of</text>
    <text class="s" x="56" y="438">dense + sparse candidates</text>

    <rect class="step" x="352" y="360" width="262" height="92"/>
    <text class="n" x="368" y="384">6</text>
    <text class="t" x="368" y="406">Rerank → Top-5</text>
    <text class="s" x="368" y="424">cross-encoder (bge) +</text>
    <text class="s" x="368" y="438">relevance gate → fallback</text>

    <rect class="step" x="664" y="360" width="262" height="92"/>
    <text class="n" x="680" y="384">7</text>
    <text class="t" x="680" y="406">Generate answer</text>
    <text class="s" x="680" y="424">Gemma, grounded only in</text>
    <text class="s" x="680" y="438">Top-5 context (English)</text>

    <rect class="step" x="976" y="360" width="264" height="92"/>
    <text class="n" x="992" y="384">8</text>
    <text class="t" x="992" y="406">Translate + cite</text>
    <text class="s" x="992" y="424">answer → user lang;</text>
    <text class="s" x="992" y="438">citations from PostgreSQL</text>
  </g>
  <path class="flow" d="M302 406 L352 406" marker-end="url(#a)"/>
  <path class="flow" d="M614 406 L664 406" marker-end="url(#a)"/>
  <path class="flow" d="M926 406 L976 406" marker-end="url(#a)"/>

  <!-- OUTPUT -->
  <path class="flow" d="M1108 452 L1108 510 L640 510 L640 538" marker-end="url(#a)"/>
  <rect class="pill" x="380" y="538" width="520" height="44" fill="#eef2ff" stroke="#6366f1"/>
  <text x="640" y="565" text-anchor="middle" font-size="13" font-weight="700" fill="#3730a3">Answer + citations + disclaimer  —  in the user's language</text>

  <!-- SIDE STORES -->
  <rect class="store" x="1010" y="258" width="200" height="34"/>
  <text class="stt" x="1024" y="280">Qdrant  ·  vectors (FK payload)</text>
  <path class="flow" d="M1108 236 L1108 258" marker-end="url(#a)" opacity="0"/>

  <rect class="store" x="1010" y="462" width="200" height="34"/>
  <text class="stt" x="1024" y="484">PostgreSQL  ·  citation source</text>
</svg>
