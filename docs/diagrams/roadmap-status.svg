<svg viewBox="0 0 1280 580" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-labelledby="ttl desc">
  <title id="ttl">BrokerAssist Roadmap Status</title>
  <desc id="desc">Phase roadmap. Delivered and verified: Phase 0 research, Phase 1 UX design, Phase 2 architecture and build, Phase 3 backend foundation. Ahead: Phase 4 real vendor adapters (blocked on credentials), Phase 5/6 ingestion and retrieval worker (buildable now against mocks), Phase 7 launch hardening (blocked on owner decisions).</desc>

  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
    <style>
      .card { rx:12; stroke-width:1.6; }
      .pn   { font-size:12px; font-weight:800; letter-spacing:.06em; }
      .nm   { font-size:14.5px; font-weight:800; fill:#0f172a; }
      .nt   { font-size:10.5px; fill:#475569; }
      .bdg  { font-size:10px; font-weight:800; }
      .band { font-size:13px; font-weight:800; letter-spacing:.05em; }
      .lk   { stroke:#94a3b8; stroke-width:1.6; fill:none; }
    </style>
  </defs>

  <text x="640" y="34" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">BrokerAssist — Roadmap Status</text>
  <text x="640" y="56" text-anchor="middle" font-size="12" fill="#64748b">Research before code, design before coding. Verified end-to-end against mocks; production gated on vendor credentials + owner decisions.</text>

  <!-- ===== DELIVERED ===== -->
  <text class="band" x="40" y="92" fill="#047857">✅ DELIVERED &amp; VERIFIED</text>

  <g>
    <rect class="card" x="40"  y="104" width="272" height="150" fill="#ecfdf5" stroke="#059669"/>
    <text class="pn" x="58" y="128" fill="#047857">PHASE 0</text>
    <text class="nm" x="58" y="150">Research</text>
    <rect x="58" y="160" width="58" height="20" rx="10" fill="#059669"/><text class="bdg" x="87" y="174" text-anchor="middle" fill="#fff">DONE</text>
    <text class="nt" x="58" y="200">Competitive gap analysis,</text>
    <text class="nt" x="58" y="216">10 competitors, feature matrix.</text>
    <text class="nt" x="58" y="238" font-style="italic">→ found the unoccupied wedge</text>

    <rect class="card" x="350" y="104" width="272" height="150" fill="#ecfdf5" stroke="#059669"/>
    <text class="pn" x="368" y="128" fill="#047857">PHASE 1</text>
    <text class="nm" x="368" y="150">UX Design</text>
    <rect x="368" y="160" width="58" height="20" rx="10" fill="#059669"/><text class="bdg" x="397" y="174" text-anchor="middle" fill="#fff">DONE</text>
    <text class="nt" x="368" y="200">IA, personas, 7 journeys,</text>
    <text class="nt" x="368" y="216">wireframes, content, a11y.</text>
    <text class="nt" x="368" y="238" font-style="italic">→ buildable, signed-off UX</text>

    <rect class="card" x="660" y="104" width="272" height="150" fill="#ecfdf5" stroke="#059669"/>
    <text class="pn" x="678" y="128" fill="#047857">PHASE 2</text>
    <text class="nm" x="678" y="150">Architecture + Build</text>
    <rect x="678" y="160" width="58" height="20" rx="10" fill="#059669"/><text class="bdg" x="707" y="174" text-anchor="middle" fill="#fff">DONE</text>
    <text class="nt" x="678" y="200">Mocks-first NALCO knowledge-</text>
    <text class="nt" x="678" y="216">RAG slice + widget security.</text>
    <text class="nt" x="678" y="238" font-style="italic">→ runs credential-free</text>

    <rect class="card" x="970" y="104" width="272" height="150" fill="#ecfdf5" stroke="#059669"/>
    <text class="pn" x="988" y="128" fill="#047857">PHASE 3</text>
    <text class="nm" x="988" y="150">Backend Foundation</text>
    <rect x="988" y="160" width="58" height="20" rx="10" fill="#059669"/><text class="bdg" x="1017" y="174" text-anchor="middle" fill="#fff">DONE</text>
    <text class="nt" x="988" y="200">Auth, persistence, abuse</text>
    <text class="nt" x="988" y="216">control, real-infra wiring.</text>
    <text class="nt" x="988" y="238" font-style="italic">→ 20 tests · E2E verified</text>
  </g>

  <path class="lk" d="M312 179 L350 179" marker-end="url(#ar)"/>
  <path class="lk" d="M622 179 L660 179" marker-end="url(#ar)"/>
  <path class="lk" d="M932 179 L970 179" marker-end="url(#ar)"/>

  <!-- you are here -->
  <path class="lk" d="M1106 254 L1106 300" marker-end="url(#ar)"/>
  <rect x="1006" y="286" width="200" height="26" rx="13" fill="#1e293b"/>
  <text x="1106" y="304" text-anchor="middle" font-size="11.5" font-weight="800" fill="#fff">◀ YOU ARE HERE</text>

  <!-- ===== AHEAD ===== -->
  <text class="band" x="40" y="350" fill="#b45309">⛔ AHEAD</text>

  <g>
    <rect class="card" x="40"  y="362" width="380" height="166" fill="#eff6ff" stroke="#3b82f6"/>
    <text class="pn" x="58" y="386" fill="#1d4ed8">PHASE 5 / 6</text>
    <text class="nm" x="58" y="408">Ingestion &amp; Retrieval worker</text>
    <rect x="58" y="418" width="150" height="20" rx="10" fill="#2563eb"/><text class="bdg" x="133" y="432" text-anchor="middle" fill="#fff">BUILDABLE NOW</text>
    <text class="nt" x="58" y="458">Background worker: document → chunk →</text>
    <text class="nt" x="58" y="474">embed → upsert to Qdrant (FK payload).</text>
    <text class="nt" x="58" y="496" font-style="italic">Skeleton needs NO credentials → start here.</text>
    <text class="nt" x="58" y="514" font-style="italic">Plan: NEXT_PHASE_PLAN §A</text>

    <rect class="card" x="450" y="362" width="380" height="166" fill="#fffbeb" stroke="#d97706"/>
    <text class="pn" x="468" y="386" fill="#b45309">PHASE 4</text>
    <text class="nm" x="468" y="408">Real Vendor Adapters</text>
    <rect x="468" y="418" width="168" height="20" rx="10" fill="#d97706"/><text class="bdg" x="552" y="432" text-anchor="middle" fill="#fff">NEEDS CREDENTIALS</text>
    <text class="nt" x="468" y="458">Sarvam → Ollama → Qdrant → reranker →</text>
    <text class="nt" x="468" y="474">Gemma → TrueData, behind existing ABCs.</text>
    <text class="nt" x="468" y="496" font-style="italic">Flip BA_USE_MOCKS=false, one vendor at a time.</text>
    <text class="nt" x="468" y="514" font-style="italic">Plan: NEXT_PHASE_PLAN §C</text>

    <rect class="card" x="860" y="362" width="380" height="166" fill="#f8fafc" stroke="#94a3b8"/>
    <text class="pn" x="878" y="386" fill="#475569">PHASE 7</text>
    <text class="nm" x="878" y="408">Launch Hardening</text>
    <rect x="878" y="418" width="158" height="20" rx="10" fill="#64748b"/><text class="bdg" x="957" y="432" text-anchor="middle" fill="#fff">NEEDS DECISIONS</text>
    <text class="nt" x="878" y="458">SLOs, retention/residency, source-authority,</text>
    <text class="nt" x="878" y="474">secrets, onboarding, legal sign-off.</text>
    <text class="nt" x="878" y="496" font-style="italic">Gated on open ADRs + TBD inputs.</text>
    <text class="nt" x="878" y="514" font-style="italic">Plan: NEXT_PHASE_PLAN §D</text>
  </g>

  <!-- legend -->
  <text class="nt" x="40" y="556">Legend:　<tspan fill="#059669" font-weight="800">green</tspan> delivered　·　<tspan fill="#2563eb" font-weight="800">blue</tspan> buildable now (no creds)　·　<tspan fill="#b45309" font-weight="800">amber</tspan> blocked on credentials　·　<tspan fill="#475569" font-weight="800">grey</tspan> blocked on owner decisions</text>
</svg>
