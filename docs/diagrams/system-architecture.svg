<svg viewBox="0 0 1280 1040" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-labelledby="ttl desc">
  <title id="ttl">BrokerAssist System Architecture</title>
  <desc id="desc">Layered architecture: client browser, Next.js frontend, FastAPI API edge with a security gate, an intent router that forks into a market branch and a knowledge RAG branch, swappable adapter interfaces, and PostgreSQL, Redis and Qdrant data stores.</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .band   { fill:#f8fafc; stroke:#e2e8f0; stroke-width:1; rx:14; }
      .lab    { fill:#64748b; font-size:12px; font-weight:700; letter-spacing:.08em; }
      .box    { rx:10; stroke-width:1.5; }
      .bt     { font-size:14px; font-weight:700; }
      .bd     { font-size:11px; fill:#475569; }
      .chip   { rx:8; fill:#f1f5f9; stroke:#cbd5e1; stroke-width:1; }
      .ct     { font-size:11.5px; font-weight:700; fill:#334155; }
      .cs     { font-size:10px; fill:#64748b; }
      .flow   { stroke:#64748b; stroke-width:1.6; fill:none; }
    </style>
  </defs>

  <!-- Title -->
  <text x="640" y="36" text-anchor="middle" font-size="25" font-weight="800" fill="#0f172a">BrokerAssist — System Architecture</text>
  <text x="640" y="60" text-anchor="middle" font-size="13" fill="#64748b">Multilingual · cited · embeddable AI assistant for stock brokerages — NALCO pilot, mocks-first (Phase 2 / 3)</text>

  <!-- ===================== CLIENT ===================== -->
  <rect class="band" x="30" y="80" width="1220" height="84"/>
  <text class="lab" x="46" y="100">CLIENT</text>
  <rect class="box" x="430" y="96" width="420" height="56" fill="#eff6ff" stroke="#3b82f6"/>
  <text class="bt" x="640" y="120" text-anchor="middle" fill="#1e3a8a">Brokerage website  ·  End-investor browser</text>
  <text class="bd" x="640" y="138" text-anchor="middle">Loads embed snippet → sends widget key + page Origin</text>

  <!-- ===================== FRONTEND ===================== -->
  <rect class="band" x="30" y="180" width="1220" height="118"/>
  <text class="lab" x="46" y="200">FRONTEND · Next.js 14 App Router</text>
  <g>
    <rect class="box" x="40"  y="214" width="216" height="70" fill="#eef2ff" stroke="#6366f1"/>
    <text class="bt" x="148" y="244" text-anchor="middle" fill="#3730a3">Pages</text>
    <text class="bd" x="148" y="262" text-anchor="middle">Home · Stock · Algo</text>
    <text class="bd" x="148" y="276" text-anchor="middle">NALCO · Contact</text>

    <rect class="box" x="286" y="214" width="216" height="70" fill="#eef2ff" stroke="#6366f1"/>
    <text class="bt" x="394" y="244" text-anchor="middle" fill="#3730a3">Assistant widget</text>
    <text class="bd" x="394" y="262" text-anchor="middle">floating · full-screen</text>
    <text class="bd" x="394" y="276" text-anchor="middle">human escalation</text>

    <rect class="box" x="532" y="214" width="216" height="70" fill="#eef2ff" stroke="#6366f1"/>
    <text class="bt" x="640" y="244" text-anchor="middle" fill="#3730a3">AskButton</text>
    <text class="bd" x="640" y="266" text-anchor="middle">deep-links a query</text>

    <rect class="box" x="778" y="214" width="216" height="70" fill="#eef2ff" stroke="#6366f1"/>
    <text class="bt" x="886" y="244" text-anchor="middle" fill="#3730a3">i18n</text>
    <text class="bd" x="886" y="266" text-anchor="middle">EN · HI · TA strings</text>

    <rect class="box" x="1024" y="214" width="216" height="70" fill="#eef2ff" stroke="#6366f1"/>
    <text class="bt" x="1132" y="244" text-anchor="middle" fill="#3730a3">lib/api.js</text>
    <text class="bd" x="1132" y="266" text-anchor="middle">/session → /chat</text>
  </g>

  <!-- ===================== API EDGE + SECURITY ===================== -->
  <rect class="band" x="30" y="314" width="1220" height="196"/>
  <text class="lab" x="46" y="334">API EDGE · FastAPI</text>

  <rect class="box" x="40" y="346" width="360" height="64" fill="#f8fafc" stroke="#94a3b8"/>
  <text class="bt" x="220" y="372" text-anchor="middle" fill="#334155">Edge middleware</text>
  <text class="bd" x="220" y="392" text-anchor="middle">CORS (*) · Correlation-ID structured logging</text>

  <rect class="box" x="40" y="420" width="360" height="74" fill="#f8fafc" stroke="#94a3b8"/>
  <text class="bt" x="220" y="446" text-anchor="middle" fill="#334155">Public widget endpoints</text>
  <text class="bd" x="220" y="466" text-anchor="middle">POST /session · POST /chat</text>
  <text class="bd" x="220" y="481" text-anchor="middle">/search · /filings · /stock</text>

  <rect class="box" x="420" y="346" width="470" height="148" fill="#fffbeb" stroke="#d97706"/>
  <text class="bt" x="436" y="372" fill="#92400e">Security &amp; abuse gate  (runs before any LLM / translate)</text>
  <text class="bd" x="436" y="396">• Widget auth — SHA-256 key lookup + Origin allowlist</text>
  <text class="bd" x="436" y="416">• Signed session JWT (30-min TTL)</text>
  <text class="bd" x="436" y="436">• Rate limits — per-session/min · per-IP/min · sessions/IP/hr</text>
  <text class="bd" x="436" y="456">• Per-tenant daily quota (durable + Redis hot counter)</text>
  <text class="bd" x="436" y="478">• Abuse events logged (bad key / origin / rate / quota)</text>

  <rect class="box" x="910" y="346" width="330" height="148" fill="#fdf2f8" stroke="#db2777"/>
  <text class="bt" x="926" y="372" fill="#9d174d">Admin plane — separate auth</text>
  <text class="bd" x="926" y="396">POST /admin/login</text>
  <text class="bd" x="926" y="414">bcrypt + failed-attempt lockout</text>
  <text class="bd" x="926" y="436">/admin/tenants · keys · allowlist</text>
  <text class="bd" x="926" y="458">Admin audit log</text>
  <text class="bd" x="926" y="478">Admin JWT (1-hr TTL)</text>

  <!-- ===================== INTENT ROUTER ===================== -->
  <rect class="box" x="430" y="524" width="420" height="56" fill="#f5f3ff" stroke="#7c3aed"/>
  <text class="bt" x="640" y="548" text-anchor="middle" fill="#5b21b6">Intent Router — classify(message)</text>
  <text class="bd" x="640" y="566" text-anchor="middle">market keyword + known symbol → market   ·   else → knowledge</text>

  <!-- ===================== BRANCHES ===================== -->
  <rect class="band" x="30" y="598" width="1220" height="188"/>
  <text class="lab" x="46" y="618">PROCESSING BRANCHES</text>

  <rect class="box" x="70" y="630" width="520" height="142" fill="#f0fdfa" stroke="#0d9488"/>
  <text class="bt" x="330" y="656" text-anchor="middle" fill="#0f766e">Market branch</text>
  <text class="bd" x="330" y="680" text-anchor="middle">Market Service → Redis-cached LTP / OHLC quote</text>
  <text class="bd" x="330" y="700" text-anchor="middle">MarketDataProvider adapter (TrueData in prod)</text>
  <text class="bd" x="330" y="724" text-anchor="middle" font-weight="700" fill="#b91c1c">⚠ Market data NEVER served from Qdrant</text>
  <text class="bd" x="330" y="748" text-anchor="middle">cache-hit / miss surfaced in debug payload</text>

  <rect class="box" x="690" y="630" width="520" height="142" fill="#ecfdf5" stroke="#059669"/>
  <text class="bt" x="950" y="656" text-anchor="middle" fill="#047857">Knowledge branch — RAG pipeline</text>
  <text class="bd" x="950" y="680" text-anchor="middle">detect → translate→EN → embed → hybrid retrieve</text>
  <text class="bd" x="950" y="700" text-anchor="middle">→ RRF Top-20 → rerank Top-5 → Gemma → translate</text>
  <text class="bd" x="950" y="724" text-anchor="middle" font-weight="700" fill="#047857">→ citations resolved from PostgreSQL</text>
  <text class="bd" x="950" y="748" text-anchor="middle">relevance gate → friendly fallback when off-topic</text>

  <!-- ===================== ADAPTERS ===================== -->
  <rect class="band" x="30" y="802" width="1220" height="92"/>
  <text class="lab" x="46" y="822">SWAPPABLE ADAPTER INTERFACES — use_mocks=true today, real vendors when keys arrive</text>
  <g>
    <rect class="chip" x="40"   y="834" width="190" height="48"/>
    <text class="ct" x="135"  y="856" text-anchor="middle">LanguageProvider</text>
    <text class="cs" x="135"  y="872" text-anchor="middle">Sarvam AI</text>

    <rect class="chip" x="240"  y="834" width="190" height="48"/>
    <text class="ct" x="335"  y="856" text-anchor="middle">EmbeddingProvider</text>
    <text class="cs" x="335"  y="872" text-anchor="middle">embeddinggemma</text>

    <rect class="chip" x="440"  y="834" width="190" height="48"/>
    <text class="ct" x="535"  y="856" text-anchor="middle">VectorStore</text>
    <text class="cs" x="535"  y="872" text-anchor="middle">Qdrant hybrid</text>

    <rect class="chip" x="640"  y="834" width="190" height="48"/>
    <text class="ct" x="735"  y="856" text-anchor="middle">ReRanker</text>
    <text class="cs" x="735"  y="872" text-anchor="middle">bge cross-encoder</text>

    <rect class="chip" x="840"  y="834" width="190" height="48"/>
    <text class="ct" x="935"  y="856" text-anchor="middle">LLM</text>
    <text class="cs" x="935"  y="872" text-anchor="middle">Gemma (Ollama)</text>

    <rect class="chip" x="1040" y="834" width="190" height="48"/>
    <text class="ct" x="1135" y="856" text-anchor="middle">MarketDataProvider</text>
    <text class="cs" x="1135" y="872" text-anchor="middle">TrueData</text>
  </g>

  <!-- ===================== DATA STORES ===================== -->
  <rect class="band" x="30" y="902" width="1220" height="128"/>
  <text class="lab" x="46" y="922">DATA STORES</text>

  <rect class="box" x="40" y="934" width="400" height="84" fill="#fff1f2" stroke="#e11d48"/>
  <text class="bt" x="240" y="958" text-anchor="middle" fill="#9f1239">PostgreSQL</text>
  <text class="bd" x="240" y="978" text-anchor="middle">Document Registry → citations · tenants</text>
  <text class="bd" x="240" y="994" text-anchor="middle">api_keys · allowlist · chat · quotas · audit</text>

  <rect class="box" x="460" y="934" width="350" height="84" fill="#fff1f2" stroke="#e11d48"/>
  <text class="bt" x="635" y="958" text-anchor="middle" fill="#9f1239">Redis</text>
  <text class="bd" x="635" y="978" text-anchor="middle">session cache · rate-limit &amp; quota</text>
  <text class="bd" x="635" y="994" text-anchor="middle">counters · in-memory fallback (dev)</text>

  <rect class="box" x="830" y="934" width="410" height="84" fill="#fff1f2" stroke="#e11d48"/>
  <text class="bt" x="1035" y="958" text-anchor="middle" fill="#9f1239">Qdrant</text>
  <text class="bd" x="1035" y="978" text-anchor="middle">dense + native sparse vectors</text>
  <text class="bd" x="1035" y="994" text-anchor="middle">payload = FK (document_id, chunk_id) only</text>

  <!-- ===================== FLOW ARROWS ===================== -->
  <path class="flow" d="M640 152 L640 214" marker-end="url(#arr)"/>
  <path class="flow" d="M1132 284 L1132 300 L640 300 L640 346" marker-end="url(#arr)"/>
  <path class="flow" d="M220 410 L220 420" marker-end="url(#arr)"/>
  <path class="flow" d="M220 494 L220 552 L430 552" marker-end="url(#arr)"/>
  <path class="flow" d="M540 552 L640 552" stroke="none"/>
  <path class="flow" d="M520 580 L520 600 L330 600 L330 630" marker-end="url(#arr)"/>
  <path class="flow" d="M760 580 L760 600 L950 600 L950 630" marker-end="url(#arr)"/>
  <path class="flow" d="M330 772 L330 800 L335 834" marker-end="url(#arr)"/>
  <path class="flow" d="M950 772 L950 800 L535 800 L535 834" marker-end="url(#arr)"/>
  <path class="flow" d="M535 882 L535 905 L240 905 L240 934" marker-end="url(#arr)"/>
  <path class="flow" d="M1135 882 L1135 905 L1035 905 L1035 934" marker-end="url(#arr)"/>
  <path class="flow" d="M335 882 L335 905 L635 905 L635 934" marker-end="url(#arr)"/>
</svg>
