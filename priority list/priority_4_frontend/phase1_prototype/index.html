<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BrokerAssist — Multilingual AI assistant for brokerages</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600&family=Noto+Sans+Devanagari:wght@400;600&family=Noto+Sans+Tamil:wght@400;600&family=Noto+Sans+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="home">
<main id="main">
  <section class="hero wrap">
    <span class="eyebrow" data-i18n="home_eyebrow"></span>
    <h1 data-i18n="home_h1"></h1>
    <p class="lead" data-i18n="home_lead"></p>
    <div class="cta-row">
      <a class="btn btn-primary" href="contact.html" data-i18n="cta_book"></a>
      <button class="btn" type="button" onclick="document.getElementById('assist-launch').click()" data-i18n="cta_try"></button>
    </div>
  </section>

  <section class="surface">
    <div class="wrap">
      <div class="grid cols-4">
        <div class="card"><i class="ti ti-language ic" aria-hidden="true"></i><h3 data-i18n="d1t"></h3><p data-i18n="d1d"></p></div>
        <div class="card"><i class="ti ti-quote ic" aria-hidden="true"></i><h3 data-i18n="d2t"></h3><p data-i18n="d2d"></p></div>
        <div class="card"><i class="ti ti-chart-candle ic" aria-hidden="true"></i><h3 data-i18n="d3t"></h3><p data-i18n="d3d"></p></div>
        <div class="card"><i class="ti ti-code ic" aria-hidden="true"></i><h3 data-i18n="d4t"></h3><p data-i18n="d4d"></p></div>
      </div>
    </div>
  </section>

  <section class="wrap">
    <div class="grid cols-2" style="align-items:center">
      <div>
        <h2 data-i18n="band_title"></h2>
        <p data-i18n="band_sub"></p>
        <a class="btn btn-primary" href="contact.html" data-i18n="cta_book"></a>
      </div>
      <div class="demo">
        <div class="muted" style="font-size:.8rem;margin-bottom:10px" data-i18n="demo_label"></div>
        <div class="row">
          <div class="bubble user" data-i18n="demoq_home"></div>
          <div class="bubble bot" data-i18n="ans_nalco"></div>
          <span class="cite"><i class="ti ti-file-text" aria-hidden="true"></i><span><span data-i18n="src_prefix"></span>: <span data-i18n="src_nalco"></span></span></span>
          <div style="margin-top:6px"><button class="btn btn-sm" type="button" data-ask="demoq_home" data-i18n="cta_try"></button></div>
        </div>
      </div>
    </div>
  </section>

  <section class="surface">
    <div class="wrap">
      <h2 data-i18n="how_title"></h2>
      <div class="grid cols-3" style="margin:18px 0">
        <div class="card"><i class="ti ti-key ic" aria-hidden="true"></i><p data-i18n="how_1"></p></div>
        <div class="card"><i class="ti ti-code ic" aria-hidden="true"></i><p data-i18n="how_2"></p></div>
        <div class="card"><i class="ti ti-messages ic" aria-hidden="true"></i><p data-i18n="how_3"></p></div>
      </div>
      <div class="codebox">&lt;script src="https://cdn.brokerassist.ai/widget.js"
        data-key="YOUR_API_KEY" data-lang="auto"&gt;&lt;/script&gt;</div>
      <p class="muted" style="margin-top:8px;font-size:.85rem" data-i18n="how_code_caption"></p>
    </div>
  </section>

  <section class="wrap center">
    <h2 data-i18n="proof_title"></h2>
    <div class="grid cols-3" style="margin-top:18px">
      <div class="card"><div class="stat" data-i18n="p1n"></div><p data-i18n="p1l"></p></div>
      <div class="card"><div class="stat" data-i18n="p2n"></div><p data-i18n="p2l"></p></div>
      <div class="card"><div class="stat" data-i18n="p3n"></div><p data-i18n="p3l"></p></div>
    </div>
  </section>
</main>
<script>window.ASSIST_SEED = "Explain NALCO's latest quarterly result";</script>
<script src="assets/app.js"></script>
</body>
</html>
