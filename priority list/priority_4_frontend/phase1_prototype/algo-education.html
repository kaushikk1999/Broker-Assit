<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Algo Education — BrokerAssist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600&family=Noto+Sans+Devanagari:wght@400;600&family=Noto+Sans+Tamil:wght@400;600&family=Noto+Sans+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="algo">
<main id="main">
  <section class="hero wrap">
    <span class="eyebrow" data-i18n="algo_eyebrow"></span>
    <h1 data-i18n="algo_h1"></h1>
    <p class="lead" data-i18n="algo_lead"></p>
  </section>

  <section class="wrap">
    <div class="grid cols-2" style="align-items:start">
      <div class="demo">
        <div class="muted" style="font-size:.8rem;margin-bottom:10px" data-i18n="demo_label"></div>
        <div class="row">
          <div class="bubble user" data-i18n="aq"></div>
          <div class="bubble bot" data-i18n="ans_algo"></div>
          <span class="cite"><i class="ti ti-file-text" aria-hidden="true"></i><span><span data-i18n="src_prefix"></span>: <span data-i18n="src_algo"></span></span></span>
          <p class="disclaimer" data-i18n="algo_disc"></p>
          <div style="margin-top:6px"><button class="btn btn-sm" type="button" data-ask="aq" data-i18n="cta_try"></button></div>
        </div>
      </div>
      <div>
        <h3 data-i18n="algo_topics_title"></h3>
        <div class="grid" style="gap:12px">
          <div class="card"><i class="ti ti-box ic" aria-hidden="true"></i><p data-i18n="at1"></p></div>
          <div class="card"><i class="ti ti-certificate ic" aria-hidden="true"></i><p data-i18n="at2"></p></div>
          <div class="card"><i class="ti ti-server ic" aria-hidden="true"></i><p data-i18n="at3"></p></div>
          <div class="card"><i class="ti ti-shield-lock ic" aria-hidden="true"></i><p data-i18n="at4"></p></div>
        </div>
      </div>
    </div>
  </section>

  <section class="surface center">
    <div class="wrap">
      <h2 data-i18n="band_title"></h2>
      <a class="btn btn-primary" href="contact.html" data-i18n="cta_book"></a>
    </div>
  </section>
</main>
<script>window.ASSIST_SEED = "What's the difference between white-box and black-box algos?";</script>
<script src="assets/app.js"></script>
</body>
</html>
