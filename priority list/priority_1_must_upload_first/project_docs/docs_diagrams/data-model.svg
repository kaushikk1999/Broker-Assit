<svg viewBox="0 0 1300 980" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-labelledby="ttl desc">
  <title id="ttl">BrokerAssist Data Model</title>
  <desc id="desc">Entity map grouped into four domains — Tenancy and Identity, Document Registry, Conversation, and Abuse/Cost/Analytics — plus the external Qdrant vector collection which stores only foreign keys to document chunks. PostgreSQL is the system of record; tenants and documents are the two hub tables.</desc>

  <defs>
    <marker id="fk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .panel { fill:#f8fafc; stroke:#e2e8f0; stroke-width:1.5; rx:14; }
      .plab  { font-size:13px; font-weight:800; letter-spacing:.03em; }
      .ent   { rx:9; fill:#ffffff; stroke-width:1.4; }
      .hub   { stroke-width:2.2; }
      .en    { font-size:12.5px; font-weight:700; fill:#0f172a; }
      .fld   { font-size:10px; fill:#475569; }
      .pk    { font-size:10px; fill:#0f172a; font-weight:700; }
      .rel   { stroke:#94a3b8; stroke-width:1.4; fill:none; }
      .ext   { stroke-dasharray:5 4; }
    </style>
  </defs>

  <text x="650" y="34" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">BrokerAssist — Data Model (PostgreSQL system of record)</text>
  <text x="650" y="56" text-anchor="middle" font-size="12" fill="#64748b">Two hub tables: tenants (multi-tenancy) and documents (citation source of truth). Qdrant holds vectors keyed by FK only.</text>

  <!-- ============ PANEL A — TENANCY ============ -->
  <rect class="panel" x="30" y="78" width="600" height="372"/>
  <text class="plab" x="48" y="100" fill="#4338ca">TENANCY &amp; IDENTITY</text>

  <rect class="ent hub" x="50" y="112" width="270" height="86" stroke="#6366f1" fill="#eef2ff"/>
  <text class="en" x="64" y="132">tenants  ◆ hub</text>
  <text class="pk" x="64" y="150">PK id</text>
  <text class="fld" x="64" y="166">name · daily_quota</text>
  <text class="fld" x="64" y="182">is_active · created_at</text>

  <rect class="ent" x="350" y="112" width="262" height="86" stroke="#6366f1"/>
  <text class="en" x="364" y="132">users  (admin plane)</text>
  <text class="pk" x="364" y="150">PK id · email (unique)</text>
  <text class="fld" x="364" y="166">password_hash (bcrypt) · role</text>
  <text class="fld" x="364" y="182">failed_attempts · locked_until</text>

  <rect class="ent" x="50" y="216" width="270" height="74" stroke="#6366f1"/>
  <text class="en" x="64" y="236">api_keys</text>
  <text class="pk" x="64" y="254">PK id · FK tenant_id</text>
  <text class="fld" x="64" y="270">key_prefix · key_hash(SHA-256) · status</text>

  <rect class="ent" x="350" y="216" width="262" height="74" stroke="#6366f1"/>
  <text class="en" x="364" y="236">domain_allowlist</text>
  <text class="pk" x="364" y="254">PK id · FK tenant_id</text>
  <text class="fld" x="364" y="270">domain (host[:port], *.wildcard)</text>

  <rect class="ent" x="50" y="308" width="270" height="68" stroke="#6366f1"/>
  <text class="en" x="64" y="328">sessions  (anonymous)</text>
  <text class="pk" x="64" y="346">PK id · FK tenant_id · ip</text>

  <rect class="ent" x="350" y="308" width="262" height="68" stroke="#94a3b8"/>
  <text class="en" x="364" y="328">feedback</text>
  <text class="pk" x="364" y="346">PK id · session_id · rating · score</text>

  <!-- ============ PANEL B — DOCUMENT REGISTRY ============ -->
  <rect class="panel" x="670" y="78" width="600" height="372"/>
  <text class="plab" x="688" y="100" fill="#047857">DOCUMENT REGISTRY — citation source of truth</text>

  <rect class="ent hub" x="690" y="112" width="270" height="104" stroke="#059669" fill="#ecfdf5"/>
  <text class="en" x="704" y="132">documents  ◆ hub</text>
  <text class="pk" x="704" y="150">PK id</text>
  <text class="fld" x="704" y="166">source · url · company · title</text>
  <text class="fld" x="704" y="182">filing_type · filing_date</text>
  <text class="fld" x="704" y="198">document_version · checksum</text>

  <rect class="ent" x="990" y="112" width="262" height="104" stroke="#059669"/>
  <text class="en" x="1004" y="132">document_chunks</text>
  <text class="pk" x="1004" y="150">PK id · FK document_id</text>
  <text class="fld" x="1004" y="166">chunk_index · lang</text>
  <text class="fld" x="1004" y="182">text  (vector lives in Qdrant)</text>

  <rect class="ent" x="690" y="232" width="270" height="70" stroke="#059669"/>
  <text class="en" x="704" y="252">document_versions</text>
  <text class="pk" x="704" y="270">PK id · FK document_id</text>
  <text class="fld" x="704" y="286">version · checksum · change_note</text>

  <rect class="ent" x="990" y="232" width="262" height="70" stroke="#059669"/>
  <text class="en" x="1004" y="252">document_audit_history</text>
  <text class="pk" x="1004" y="270">PK id · FK document_id</text>
  <text class="fld" x="1004" y="286">action · actor · detail(JSON)</text>

  <!-- external Qdrant -->
  <rect class="ent" x="990" y="334" width="262" height="86" stroke="#e11d48" fill="#fff1f2"/>
  <text class="en" x="1004" y="354" fill="#9f1239">Qdrant collection  (external)</text>
  <text class="fld" x="1004" y="372" fill="#9f1239">dense + native sparse vectors</text>
  <text class="fld" x="1004" y="388" fill="#9f1239">payload = { document_id, chunk_id }</text>
  <text class="fld" x="1004" y="404" fill="#9f1239">no citation text — FK only</text>

  <!-- ============ PANEL C — CONVERSATION ============ -->
  <rect class="panel" x="30" y="476" width="600" height="200"/>
  <text class="plab" x="48" y="498" fill="#6d28d9">CONVERSATION</text>

  <rect class="ent" x="50" y="510" width="270" height="92" stroke="#7c3aed"/>
  <text class="en" x="64" y="530">chat_conversations</text>
  <text class="pk" x="64" y="548">PK id · FK tenant_id</text>
  <text class="fld" x="64" y="564">session_id · started_at</text>

  <rect class="ent" x="350" y="510" width="262" height="92" stroke="#7c3aed"/>
  <text class="en" x="364" y="530">chat_messages</text>
  <text class="pk" x="364" y="548">PK id · FK conversation_id</text>
  <text class="fld" x="364" y="564">role · content · language</text>
  <text class="fld" x="364" y="580">intent · branch · created_at</text>

  <!-- ============ PANEL D — ABUSE / COST / ANALYTICS ============ -->
  <rect class="panel" x="670" y="476" width="600" height="290"/>
  <text class="plab" x="688" y="498" fill="#b45309">ABUSE · COST · ANALYTICS</text>

  <rect class="ent" x="690" y="510" width="270" height="70" stroke="#d97706"/>
  <text class="en" x="704" y="530">usage_quotas</text>
  <text class="pk" x="704" y="548">PK id · FK tenant_id</text>
  <text class="fld" x="704" y="564">day · count  (unique tenant+day)</text>

  <rect class="ent" x="990" y="510" width="262" height="70" stroke="#d97706"/>
  <text class="en" x="1004" y="530">abuse_events</text>
  <text class="pk" x="1004" y="548">PK id · FK tenant_id · ip</text>
  <text class="fld" x="1004" y="564">kind · detail · created_at</text>

  <rect class="ent" x="690" y="594" width="270" height="70" stroke="#d97706"/>
  <text class="en" x="704" y="614">admin_audit_log</text>
  <text class="pk" x="704" y="632">PK id · FK user_id</text>
  <text class="fld" x="704" y="648">action · target · detail(JSON) · ip</text>

  <rect class="ent" x="990" y="594" width="262" height="70" stroke="#d97706"/>
  <text class="en" x="1004" y="614">analytics  (event stream)</text>
  <text class="pk" x="1004" y="632">PK id · FK tenant_id · session_id</text>
  <text class="fld" x="1004" y="648">event_type · payload(JSON)</text>

  <text class="fld" x="690" y="694" font-style="italic">All tenant-scoped tables carry FK tenant_id → tenants.id.</text>
  <text class="fld" x="690" y="712" font-style="italic">Every admin write is recorded in admin_audit_log; every</text>
  <text class="fld" x="690" y="730" font-style="italic">security breach (bad key/origin, rate, quota) in abuse_events.</text>

  <!-- ============ RELATIONSHIP LINES ============ -->
  <!-- documents -> chunks / versions / audit -->
  <path class="rel" d="M960 164 L990 164" marker-end="url(#fk)"/>
  <path class="rel" d="M825 216 L825 232" marker-end="url(#fk)"/>
  <path class="rel" d="M960 267 L990 267" marker-end="url(#fk)"/>
  <!-- chunks -> Qdrant (FK-only, dashed) -->
  <path class="rel ext" d="M1121 216 L1121 334" marker-end="url(#fk)"/>
  <text class="fld" x="1128" y="280" fill="#9f1239">FK payload</text>
  <!-- conversations -> messages -->
  <path class="rel" d="M320 556 L350 556" marker-end="url(#fk)"/>
  <!-- tenants hub fan-out (representative) -->
  <path class="rel" d="M185 198 L185 216" marker-end="url(#fk)"/>
  <path class="rel" d="M320 150 L350 150" marker-end="url(#fk)"/>

  <!-- legend -->
  <rect x="30" y="700" width="600" height="62" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
  <text class="fld" x="48" y="722" font-weight="700" fill="#334155">Legend</text>
  <line x1="48" y1="740" x2="84" y2="740" class="rel" marker-end="url(#fk)"/>
  <text class="fld" x="92" y="744">foreign-key relationship (PostgreSQL)</text>
  <line x1="330" y1="740" x2="366" y2="740" class="rel ext" marker-end="url(#fk)"/>
  <text class="fld" x="374" y="744">external store — FK-only payload (Qdrant)</text>
  <text class="fld" x="48" y="758">◆ hub = referenced by many tables.  Migrations: Alembic (alembic/versions/0001_initial.py).</text>
</svg>
